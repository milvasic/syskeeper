services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: keeper
      POSTGRES_USER: keeper
      POSTGRES_PASSWORD: keeper
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keeper -d keeper"]
      interval: 10s
      timeout: 5s
      retries: 5

  keeper:
    build:
      context: keeper
      dockerfile: src/Keeper.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=keeper;Username=keeper;Password=keeper"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
